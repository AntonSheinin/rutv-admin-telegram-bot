services:
  rutv-admin-bot:
    image: rutv-admin-bot:latest
    build: .
    container_name: rutv-admin-bot
    env_file:
      - .env
    ports:
      - "8001:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
